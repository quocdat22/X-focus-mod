<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #15202b;
      color: #e7e9ea;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header svg {
      width: 24px;
      height: 24px;
      fill: #e7e9ea;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-top: 1px solid #2f3336;
    }

    .toggle-label {
      font-size: 14px;
      font-weight: 500;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #3e4144;
      transition: 0.3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: #e7e9ea;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #1d9bf0;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
      transition: background-color 0.3s ease;
    }

    .status.on {
      background: rgba(29, 155, 240, 0.15);
      color: #1d9bf0;
    }

    .status.off {
      background: rgba(62, 65, 68, 0.5);
      color: #71767b;
    }

    .shortcut {
      margin-top: 12px;
      font-size: 11px;
      color: #71767b;
      text-align: center;
    }

    kbd {
      background: #2f3336;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      color: #e7e9ea;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24">
      <path d="M21.742 21.75l-7.563-11.179 7.056-8.321h-2.456l-5.691 6.714-4.54-6.714H2.359l7.29 10.776L2.25 21.75h2.456l6.035-7.118 4.818 7.118h6.191-.008zM7.739 3.818L18.81 20.182h-2.447L5.29 3.818h2.447z"/>
    </svg>
    <h1>Focus Mode</h1>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Zen Mode</span>
    <label class="switch">
      <input type="checkbox" id="focusToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status off" id="statusText">Focus mode is OFF</div>

  <div class="shortcut">Shortcut: <kbd>Alt</kbd> + <kbd>Z</kbd></div>

  <script src="popup.js"></script>
</body>
</html>
